<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0d14">
<link rel="icon" type="image/png" href="/favicon.png?v=2">
<title>SOSO BTC MAGNET</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0b0d14;
    --bg-secondary: #111520;
    --bg-card: #161b28;
    --bg-hover: #1e2434;
    --border: #2a3042;
    --border-light: #353d52;
    --text-primary: #e8e4dc;
    --text-secondary: #9aa3b2;
    --text-muted: #5e6878;
    --accent: #d4af37;
    --accent-glow: rgba(212, 175, 55, 0.12);
    --success: #5dade2;
    --success-dim: rgba(93, 173, 226, 0.1);
    --danger: #c0392b;
    --danger-dim: rgba(192, 57, 43, 0.1);
    --info: #7d8c9d;
    --info-dim: rgba(125, 140, 157, 0.1);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.4);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -2px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.6), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    --font-norse: 'Cinzel', 'Georgia', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background:
      radial-gradient(ellipse at 20% 0%, rgba(46, 80, 60, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 10%, rgba(80, 40, 80, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 0%, rgba(20, 30, 50, 0.4) 0%, transparent 60%),
      var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-ring {
    0% { transform: scale(0.8); opacity: 0.5; }
    100% { transform: scale(2); opacity: 0; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .animate-in { animation: fadeInUp 0.5s ease-out forwards; }

  .app { display: flex; min-height: 100vh; }
  
  .sidebar {
    width: 260px;
    background: linear-gradient(180deg, var(--bg-secondary) 0%, #0f131d 100%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 50;
  }
  
  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .logo-3d {
    width: 48px; height: 48px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-img {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
    position: relative; z-index: 2;
    animation: shield-float 3.5s ease-in-out infinite;
    filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.5));
  }

  .logo-shield {
    width: 40px; height: 40px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%, rgba(255,255,255,0.08) 0%, transparent 60%),
      linear-gradient(145deg, #4a3018 0%, #3d2612 50%, #2a1a0a 100%);
    border: 2px solid #6b7280;
    box-shadow:
      inset 0 1px 2px rgba(255,255,255,0.1),
      2px 3px 0 #1a1208, 3px 4px 0 #1a1208,
      4px 6px 12px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #d4af37;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    position: relative; z-index: 2;
    animation: shield-float 3.5s ease-in-out infinite;
  }

  .logo-shield::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(107, 114, 128, 0.3);
    pointer-events: none;
  }

  @keyframes shield-float {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-2px) rotate(2deg); }
  }

  .magnet-ring {
    position: absolute;
    inset: -6px;
    border: 1.5px solid rgba(212, 175, 55, 0.25);
    border-radius: 50%;
    animation: magnet-pulse 2.4s ease-out infinite;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes magnet-pulse {
    0% { transform: scale(0.7); opacity: 0.5; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  
  .brand-text h1 {
    font-family: var(--font-norse);
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1.2;
    color: var(--text-primary);
    text-transform: uppercase;
  }

  .brand-text span {
    font-family: var(--font-norse);
    font-size: 10px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .nav-section {
    padding: 16px 12px;
    flex: 1;
    overflow-y: auto;
  }
  
  .nav-label {
    font-family: var(--font-norse);
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 0 12px;
    margin-bottom: 8px;
  }
  
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  
  .nav-item:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }
  
  .nav-item.active {
    background: var(--accent-glow);
    color: var(--accent);
    box-shadow: inset 0 0 0 1px rgba(212, 175, 55, 0.25);
  }
  
  .nav-item svg {
    width: 20px; height: 20px;
    opacity: 0.7;
    flex-shrink: 0;
  }
  
  .nav-item.active svg { opacity: 1; }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  
  .connection-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    position: relative;
    flex-shrink: 0;
  }
  
  .status-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse-ring 2s ease-out infinite;
  }
  
  .status-dot.offline {
    background: var(--danger);
  }
  
  .status-dot.offline::after {
    background: var(--danger);
    animation: none;
  }

  .main {
    flex: 1;
    margin-left: 260px;
    display: flex;
    flex-direction: column;
  }
  
  .topbar {
    height: 64px;
    background: linear-gradient(180deg, var(--bg-secondary) 0%, #0f131d 100%);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 40;
  }

  .page-title {
    font-family: var(--font-norse);
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-primary);
  }
  
  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .badge-live {
    background: var(--success-dim);
    color: var(--success);
    border: 1px solid rgba(93, 173, 226, 0.25);
  }

  .badge-paper {
    background: var(--info-dim);
    color: var(--info);
    border: 1px solid rgba(125, 140, 157, 0.25);
  }

  .badge-halted {
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid rgba(192, 57, 43, 0.25);
  }

  .content {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
    min-height: calc(100vh - 64px);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 32px;
  }
  
  .stat-card {
    background: linear-gradient(145deg, var(--bg-card) 0%, #131824 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }

  .stat-card:hover {
    border-color: var(--border-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,55,0.05);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0.6;
  }

  .stat-card.positive::before { background: linear-gradient(90deg, var(--success), transparent); }
  .stat-card.negative::before { background: linear-gradient(90deg, var(--danger), transparent); }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 6px; right: 12px;
    width: 24px; height: 24px;
    border-top: 1px solid rgba(212,175,55,0.15);
    border-right: 1px solid rgba(212,175,55,0.15);
    border-radius: 0 6px 0 0;
    pointer-events: none;
  }
  
  .stat-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .stat-value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    font-family: var(--font-mono);
    transition: color 0.3s;
  }
  
  .stat-value.accent { color: var(--accent); }
  .stat-value.positive { color: var(--success); }
  .stat-value.negative { color: var(--danger); }
  
  .stat-change {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .stat-change.positive { color: var(--success); }
  .stat-change.negative { color: var(--danger); }

  .section {
    background: linear-gradient(145deg, var(--bg-card) 0%, #131824 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 24px;
    overflow: hidden;
    position: relative;
  }

  .section::before {
    content: '';
    position: absolute;
    top: 0; left: 24px; right: 24px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.15), transparent);
  }

  .section-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title {
    font-family: var(--font-norse);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title svg {
    width: 20px; height: 20px;
    color: var(--accent);
  }

  .chart-container {
    padding: 24px;
    height: 320px;
    position: relative;
  }

  .table-wrap {
    overflow-x: auto;
  }
  
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  
  thead th {
    text-align: left;
    padding: 12px 24px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  
  tbody tr:hover {
    background: var(--bg-hover);
  }
  
  tbody td {
    padding: 14px 24px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  
  tbody td strong {
    color: var(--text-primary);
    font-weight: 600;
  }
  
  .cell-mono {
    font-family: var(--font-mono);
    font-weight: 500;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .tag-buy {
    background: var(--success-dim);
    color: var(--success);
    border: 1px solid rgba(93, 173, 226, 0.25);
  }

  .tag-sell {
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid rgba(192, 57, 43, 0.25);
  }

  .tag-filled {
    background: rgba(212, 175, 55, 0.1);
    color: var(--accent);
    border: 1px solid rgba(212, 175, 55, 0.2);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-family: inherit;
  }
  
  .btn-primary {
    background: linear-gradient(135deg, #c9a02f, #8a6e1c);
    color: #0b0d14;
    box-shadow: 0 4px 14px rgba(212, 175, 55, 0.25);
    font-family: var(--font-norse);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
    background: linear-gradient(135deg, #d4af37, #a07d22);
  }

  .btn-danger {
    background: linear-gradient(135deg, #a93226, #6e1e15);
    color: #fff;
    box-shadow: 0 4px 14px rgba(192, 57, 43, 0.25);
    font-family: var(--font-norse);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .btn-danger:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(192, 57, 43, 0.35);
    background: linear-gradient(135deg, #c0392b, #8a261c);
  }
  
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
  }
  
  .btn-outline:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
  }

  .empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
  }
  
  .empty-icon {
    width: 64px; height: 64px;
    margin: 0 auto 20px;
    background: var(--bg-hover);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.05);
  }

  .toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .toast {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 14px 20px;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 500;
    animation: fadeInUp 0.3s ease-out;
    min-width: 280px;
  }
  
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--accent); }

  @media (max-width: 1024px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
  
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .stats-grid { grid-template-columns: 1fr; }
    .content { padding: 20px; }
    .topbar { padding: 0 20px; }
  }

  /* Loading state */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #0b0d14 0%, #0a0c12 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 200;
    transition: opacity 0.5s;
  }
  
  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-right-color: rgba(212, 175, 55, 0.3);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <div style="color:var(--text-muted);font-size:14px;font-weight:500;">Loading SOSO BTC MAGNET...</div>
</div>

<div class="app" id="app" style="opacity:0;transition:opacity 0.5s;">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="logo-3d">
          <img src="/logo.png?v=2" alt="SOSO BTC" class="logo-img">
          <div class="magnet-ring"></div>
          <div class="magnet-ring" style="animation-delay:0.6s"></div>
        </div>
        <div class="brand-text">
          <h1>SOSO BTC MAGNET</h1>
          <span>Alpha Engine</span>
        </div>
      </div>
    </div>
    
    <nav class="nav-section">
      <div class="nav-label">Main</div>
      <button class="nav-item active" data-screen="dashboard" onclick="showScreen('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-screen="trades" onclick="showScreen('trades')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        Trade History
      </button>
      <button class="nav-item" data-screen="analytics" onclick="showScreen('analytics')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analytics
      </button>
      
      <div class="nav-label" style="margin-top:24px">System</div>
      <button class="nav-item" data-screen="settings" onclick="showScreen('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c0 .55.22 1.05.59 1.41.36.37.86.59 1.41.59h.09a2 2 0 1 1 0 4h-.09c-.55 0-1.05.22-1.41.59-.37.36-.59.86-.59 1.41z"/></svg>
        Configuration
      </button>
    </nav>
    
    <div class="sidebar-footer">
      <div class="connection-status">
        <div class="status-dot" id="footer-status-dot"></div>
        <span id="footer-status-text">Connecting...</span>
      </div>
      <div style="font-size:11px;color:#64748b;margin-top:8px;font-family:var(--font-mono);" id="footer-exchange">
        --
      </div>
    </div>
  </aside>
  
  <main class="main">
    <header class="topbar">
      <div class="page-title" id="page-title">Dashboard Overview</div>
      <div class="topbar-actions">
        <span class="badge badge-paper" id="topbar-badge">PAPER MODE</span>
        <button class="btn btn-primary" onclick="sendTestSignal()" style="padding:8px 16px;font-size:12px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Test Signal
        </button>
      </div>
    </header>
    
    <div class="content" id="content">
      <!-- Content injected here -->
    </div>
  </main>
  
  <div class="toast-container" id="toast-container"></div>
</div>

<script>
const API_URL = window.location.origin;
let currentScreen = 'dashboard';
let appData = null;
let tradesList = [];
let equityChart = null;
let toasts = [];
let isFirstLoad = true;

function showToast(message, type = 'info') {
  const id = Date.now();
  toasts.push({ id, message, type });
  renderToasts();
  setTimeout(() => {
    toasts = toasts.filter(t => t.id !== id);
    renderToasts();
  }, 4000);
}

function renderToasts() {
  const container = document.getElementById('toast-container');
  if (!container) return;
  container.innerHTML = toasts.map(t => `
    <div class="toast ${t.type}">
      ${t.type === 'success' ? '✓' : t.type === 'error' ? '⚠' : 'ℹ'}
      <span>${t.message}</span>
    </div>
  `).join('');
}

async function fetchData() {
  try {
    const [statusRes, tradesRes] = await Promise.all([
      fetch(`${API_URL}/api/status`),
      fetch(`${API_URL}/api/trades?limit=100`)
    ]);
    const newData = await statusRes.json();
    const newTrades = await tradesRes.json();
    
    // Only update if data changed
    const dataChanged = JSON.stringify(appData) !== JSON.stringify(newData);
    const tradesChanged = JSON.stringify(tradesList) !== JSON.stringify(newTrades);
    
    appData = newData;
    tradesList = newTrades;
    
    if (isFirstLoad) {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('app').style.opacity = '1';
      isFirstLoad = false;
      renderAll();
    } else {
      // Partial update - only update values, don't rebuild DOM
      updateValues();
      if (tradesChanged && currentScreen === 'trades') {
        renderTradesTable();
      }
    }
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

function formatCurrency(val) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val || 0);
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function updateValues() {
  const stats = appData?.stats || {};
  const isActive = appData?.autoTrade && !appData?.circuitOpen;
  const winRate = stats.totalTrades > 0 ? ((stats.wins / stats.totalTrades) * 100).toFixed(1) : 0;
  const totalPnl = stats.totalPnl || 0;
  
  // Update stat values without rebuilding cards
  const els = {
    'stat-balance': formatCurrency(appData?.balance?.usdt),
    'stat-winrate': winRate + '%',
    'stat-trades': stats.totalTrades || 0,
    'stat-dailyloss': formatCurrency(appData?.dailyLoss || 0),
    'stat-pnl': formatCurrency(totalPnl),
    'stat-wins': (stats.wins || 0) + ' / ' + (stats.losses || 0)
  };
  
  for (const [id, val] of Object.entries(els)) {
    const el = document.getElementById(id);
    if (el && el.textContent !== val) el.textContent = val;
  }
  
  // Update status badge
  const badge = document.getElementById('topbar-badge');
  if (badge) {
    const newText = appData?.paperTrading ? 'PAPER MODE' : isActive ? 'LIVE TRADING' : 'HALTED';
    const newClass = appData?.paperTrading ? 'badge-paper' : isActive ? 'badge-live' : 'badge-halted';
    if (badge.textContent !== newText) {
      badge.textContent = newText;
      badge.className = 'badge ' + newClass;
    }
  }
  
  // Update footer status
  const dot = document.getElementById('footer-status-dot');
  const txt = document.getElementById('footer-status-text');
  if (dot) dot.className = 'status-dot' + (isActive ? '' : ' offline');
  if (txt) txt.textContent = isActive ? 'System Online' : 'Trading Halted';
  
  const ex = document.getElementById('footer-exchange');
  if (ex) ex.textContent = (appData?.exchange?.toUpperCase() || 'OKX') + ' • ' + (appData?.autoTrade ? 'AUTO' : 'MANUAL');
}

function renderAll() {
  updateValues();
  if (currentScreen === 'dashboard') renderDashboard();
  else if (currentScreen === 'trades') renderTrades();
  else if (currentScreen === 'analytics') renderAnalytics();
  else if (currentScreen === 'settings') renderSettings();
}

function renderDashboard() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="stats-grid animate-in">
      <div class="stat-card">
        <div class="stat-label">Account Balance</div>
        <div class="stat-value accent" id="stat-balance">$0.00</div>
        <div class="stat-change" id="stat-pnl-wrap" style="color:var(--text-muted)">
          <span id="stat-pnl">$0.00</span> total PnL
        </div>
      </div>
      
      <div class="stat-card" id="winrate-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value" id="stat-winrate">0%</div>
        <div class="stat-change" id="stat-wins" style="color:var(--text-muted)">0 / 0</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-label">Total Trades</div>
        <div class="stat-value" id="stat-trades">0</div>
        <div class="stat-change" style="color:var(--text-muted)">All time executions</div>
      </div>
      
      <div class="stat-card" id="loss-card">
        <div class="stat-label">Daily Loss</div>
        <div class="stat-value" id="stat-dailyloss">$0.00</div>
        <div class="stat-change" style="color:var(--text-muted)">Limit: $50.00</div>
      </div>
    </div>
    
    <div class="section animate-in" style="animation-delay:0.1s">
      <div class="section-header">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Recent Activity
        </div>
        <button class="btn btn-outline" onclick="showScreen('trades')" style="padding:8px 16px;font-size:12px;">
          View All (${tradesList.length})
        </button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Side</th><th>Symbol</th><th>Amount</th><th>Entry</th><th>SL</th><th>TP</th><th>Status</th><th>Time</th></tr>
          </thead>
          <tbody id="dashboard-trades-tbody">
            ${renderTradeRows(tradesList.slice(0, 5))}
          </tbody>
        </table>
      </div>
    </div>
  `;
  updateValues();
}

function renderTrades() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section animate-in">
      <div class="section-header">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
          Complete Trade History
        </div>
        <div style="color:var(--text-muted);font-size:13px;">${tradesList.length} total executions</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Side</th><th>Symbol</th><th>Amount</th><th>Entry</th><th>SL</th><th>TP</th><th>PnL</th><th>Status</th><th>Timestamp</th></tr>
          </thead>
          <tbody id="trades-tbody">
            ${renderTradeRows(tradesList, true)}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderTradesTable() {
  const tbody = document.getElementById('trades-tbody');
  if (tbody) tbody.innerHTML = renderTradeRows(tradesList, true);
  const dashTbody = document.getElementById('dashboard-trades-tbody');
  if (dashTbody) dashTbody.innerHTML = renderTradeRows(tradesList.slice(0, 5));
}

function renderTradeRows(trades, full = false) {
  if (!trades || trades.length === 0) {
    return `<tr><td colspan="${full ? 10 : 8}"><div class="empty"><div class="empty-icon">📊</div><div style="font-size:15px;font-weight:600;margin-bottom:4px;">No trades yet</div><div style="font-size:13px">Signals will appear here when SOSO MAGNET fires</div></div></td></tr>`;
  }
  return trades.map(t => `
    <tr>
      ${full ? `<td class="cell-mono" style="color:var(--text-muted)">#${t.id}</td>` : ''}
      <td><span class="tag tag-${t.side}">${t.side.toUpperCase()}</span></td>
      <td><strong>${t.symbol}</strong></td>
      <td class="cell-mono">${formatCurrency(t.amount)}</td>
      <td class="cell-mono">${t.entryPrice ? '$' + t.entryPrice.toFixed(2) : '--'}</td>
      <td class="cell-mono" style="color:var(--danger)">${t.sl || '--'}</td>
      <td class="cell-mono" style="color:var(--success)">${t.tp || '--'}</td>
      ${full ? `<td class="cell-mono ${(t.pnl || 0) >= 0 ? 'positive' : 'negative'}" style="color:${(t.pnl || 0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${t.pnl ? formatCurrency(t.pnl) : '--'}</td>` : ''}
      <td><span class="tag tag-filled">${t.status.toUpperCase()}</span></td>
      <td style="color:var(--text-muted);font-size:12px;">${formatDate(t.createdAt)}</td>
    </tr>
  `).join('');
}

function renderAnalytics() {
  const stats = appData?.stats || {};
  const winRate = stats.totalTrades > 0 ? ((stats.wins / stats.totalTrades) * 100).toFixed(1) : 0;
  
  document.getElementById('content').innerHTML = `
    <div class="stats-grid animate-in" style="grid-template-columns:repeat(3,1fr);">
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value ${winRate >= 50 ? 'positive' : 'negative'}">${winRate}%</div>
      </div>
      <div class="stat-card positive">
        <div class="stat-label">Winning Trades</div>
        <div class="stat-value positive">${stats.wins || 0}</div>
      </div>
      <div class="stat-card negative">
        <div class="stat-label">Losing Trades</div>
        <div class="stat-value negative">${stats.losses || 0}</div>
      </div>
    </div>
    
    <div class="section animate-in" style="animation-delay:0.1s">
      <div class="section-header">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Equity Curve
        </div>
      </div>
      <div class="chart-container">
        <canvas id="equityChart"></canvas>
      </div>
    </div>
  `;
  setTimeout(initChart, 50);
}

function initChart() {
  const ctx = document.getElementById('equityChart');
  if (!ctx) return;
  if (equityChart) equityChart.destroy();
  
  const tradeData = tradesList.map((t, i) => ({
    x: new Date(t.createdAt),
    y: tradesList.slice(0, i + 1).reduce((sum, tr) => sum + (tr.pnl || 0), 0)
  }));

  equityChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Equity',
        data: tradeData,
        borderColor: '#d4af37',
        backgroundColor: 'rgba(212, 175, 55, 0.08)',
        borderWidth: 2,
        fill: true,
        tension: 0.4,
        pointRadius: 3,
        pointBackgroundColor: '#d4af37',
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161b28',
          titleColor: '#e8e4dc',
          bodyColor: '#9aa3b2',
          borderColor: '#2a3042',
          borderWidth: 1,
          padding: 12,
          displayColors: false,
          callbacks: {
            label: (ctx) => 'PnL: ' + formatCurrency(ctx.raw.y)
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'hour', displayFormats: { hour: 'MMM d HH:mm' } },
          grid: { color: '#2a3042', drawBorder: false },
          ticks: { color: '#5e6878', font: { size: 11 }, maxRotation: 0 }
        },
        y: {
          grid: { color: '#2a3042', drawBorder: false },
          ticks: { color: '#5e6878', font: { size: 11 }, callback: v => '$' + v }
        }
      }
    }
  });
}

function renderSettings() {
  const isActive = appData?.autoTrade && !appData?.circuitOpen;
  
  document.getElementById('content').innerHTML = `
    <div class="section animate-in" style="max-width:600px;">
      <div class="section-header">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c0 .55.22 1.05.59 1.41.36.37.86.59 1.41.59h.09a2 2 0 1 1 0 4h-.09c-.55 0-1.05.22-1.41.59-.37.36-.59.86-.59 1.41z"/></svg>
          Bot Configuration
        </div>
      </div>
      <div style="padding:24px;">
        <div style="display:flex;flex-direction:column;gap:16px;">
          
          <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;background:var(--bg-hover);border-radius:var(--radius-md);border:1px solid var(--border);">
            <div>
              <div style="font-weight:600;margin-bottom:4px;">System Status</div>
              <div style="font-size:13px;color:var(--text-muted);">${isActive ? 'Active and monitoring signals' : 'Trading is currently halted'}</div>
            </div>
            <div class="status-dot ${isActive ? '' : 'offline'}" style="position:relative;"></div>
          </div>
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div style="padding:16px;background:var(--bg-hover);border-radius:var(--radius-md);border:1px solid var(--border);">
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Exchange</div>
              <div style="font-weight:700;font-size:18px;">${appData?.exchange?.toUpperCase() || 'OKX'}</div>
            </div>
            <div style="padding:16px;background:var(--bg-hover);border-radius:var(--radius-md);border:1px solid var(--border);">
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Mode</div>
              <div style="font-weight:700;font-size:18px;color:${appData?.paperTrading ? 'var(--info)' : 'var(--danger)'}">${appData?.paperTrading ? 'Paper Trading' : 'LIVE'}</div>
            </div>
            <div style="padding:16px;background:var(--bg-hover);border-radius:var(--radius-md);border:1px solid var(--border);">
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Max Position</div>
              <div style="font-weight:700;font-size:18px;">${formatCurrency(appData?.maxPosition || 100)}</div>
            </div>
            <div style="padding:16px;background:var(--bg-hover);border-radius:var(--radius-md);border:1px solid var(--border);">
              <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Daily Loss Limit</div>
              <div style="font-weight:700;font-size:18px;color:var(--danger)">${formatCurrency(appData?.dailyLossLimit || 50)}</div>
            </div>
          </div>
          
          <div style="padding:16px;background:var(--bg-hover);border-radius:var(--radius-md);border:1px solid var(--border);">
            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Webhook Endpoint</div>
            <div style="font-family:var(--font-mono);font-size:13px;color:var(--accent);word-break:break-all;">${window.location.origin}/webhook</div>
          </div>
          
          <button class="btn btn-danger" onclick="killSwitch()" style="width:100%;">
            ⚠ HALT ALL TRADING
          </button>
        </div>
      </div>
    </div>
  `;
}

function showScreen(screen) {
  currentScreen = screen;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.screen === screen);
  });
  document.getElementById('page-title').textContent = 
    screen === 'dashboard' ? 'Dashboard Overview' : 
    screen === 'trades' ? 'Trade History' : 
    screen === 'analytics' ? 'Performance Analytics' : 'System Configuration';
  renderAll();
}

async function sendTestSignal() {
  try {
    const res = await fetch(`${API_URL}/webhook`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        secret: 'ragnar', symbol: 'BTCUSDT', side: 'buy',
        amount: 100, sl: 65000, tp: 72000, message: 'Test Signal'
      })
    });
    const json = await res.json();
    showToast(json.success ? 'Test signal executed' : json.error, json.success ? 'success' : 'error');
    fetchData();
  } catch (e) {
    showToast('Failed to send test signal', 'error');
  }
}

async function killSwitch() {
  if (!confirm('HALT all trading immediately?')) return;
  try {
    const res = await fetch(`${API_URL}/api/kill`, { method: 'POST' });
    const json = await res.json();
    showToast(json.message, 'info');
    fetchData();
  } catch (e) {
    showToast('Failed to halt trading', 'error');
  }
}

// Start
fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
